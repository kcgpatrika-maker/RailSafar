<!DOCTYPE html>
<html lang="hi">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>RailSafar</title>

  <!-- FONT -->

  <link
    href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <!-- HEADER -->

  <header>

    <div class="logo">

      <div class="logo-icon">
        🚉
      </div>

      <div>

        <div class="title">

          <span class="rail">
            Rail
          </span>

          <span class="safar">
            Safar
          </span>

        </div>

        <div class="tagline">

          आपकी यात्रा का स्मार्ट साथी

        </div>

      </div>

    </div>

    <div class="share-container">

      <button
        class="share-btn"
        onclick="shareApp()"
      >

        📤

      </button>

      <div class="share-text">

        Share

      </div>

    </div>

  </header>

  <!-- BUTTONS -->

  <div class="button-container">

    <div
      class="circle-btn train-btn"
      onclick="askTrainName()"
    >

      <div class="btn-icon">
        🚆
      </div>

      <div class="btn-text">

        ट्रेन कब आएगी

      </div>

    </div>

    <div class="btn-hint">

      👉 बटन दबाइये और ट्रेन + स्टेशन बोलिये

    </div>

    <div
      class="circle-btn directions-btn"
      onclick="askDirections()"
    >

      <div class="btn-icon">
        🧭
      </div>

      <div class="btn-text">

        किधर जाऊं

      </div>

    </div>

    <div class="btn-hint">

      👉 जगह का नाम बोलिये

    </div>
    <!-- EXTRA FEATURES -->

<div class="extra-buttons">

  <!-- FULL WIDTH -->

  <button
    class="full-btn timetable-btn"
    onclick="openTimeTable()"
  >

    📅 रेलवे समय-सारणी

  </button>

  <!-- HALF WIDTH ROW -->

  <div class="half-row">

    <button
      class="half-btn pnr-btn"
      onclick="openPNR()"
    >

      🎫 PNR स्टेटस

    </button>

    <button
      class="half-btn ticket-btn"
      onclick="openTicket()"
    >

      🚆 टिकट बुकिंग

    </button>

  </div>

  <!-- FULL WIDTH -->

  <button
    class="full-btn wiki-btn"
    onclick="openRailWiki()"
  >

    📘 रेलवे का विकीपीडिया

  </button>

</div>

    <!-- OUTPUT -->

    <div
      id="output-box"
      class="output-box"
    ></div>

  </div>

  <!-- MIC -->

  <div
    id="mic-overlay"
    class="mic-overlay"
    style="display:none;"
  >

    <div class="mic-icon">

      🎤

    </div>

    <div class="mic-text">

      Listening...

    </div>

  </div>

  <!-- JS FILES -->

  <script src="trains.js"></script>

  <script src="voice.js"></script>

  <script src="rail-api.js"></script>
  
  <script src="rail-wiki.js"></script>

  <script src="app.js"></script>

</body>
</html>
