<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>RailSafar</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700&display=swap" rel="stylesheet">

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:0;
      font-family:'Mukta', sans-serif;
      background:#f3f4f6;
      color:#222;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      padding:12px 15px;
      background:#ffffff;
      border-bottom:1px solid #ddd;
    }

    .logo{
      display:flex;
      align-items:flex-start;
    }

    .logo-icon{
      font-size:34px;
      margin-right:10px;
    }

    .title{
      font-size:28px;
      font-weight:bold;
      line-height:1;
    }

    .rail{
      color:#d32f2f;
    }

    .safar{
      color:#222;
    }

    .tagline{
      font-size:14px;
      color:#666;
      margin-top:3px;
    }

    .share-container{
      text-align:center;
    }

    .share-btn{
      border:none;
      background:#1976d2;
      color:white;
      width:42px;
      height:42px;
      border-radius:50%;
      font-size:18px;
      cursor:pointer;
    }

    .share-text{
      font-size:12px;
      color:#555;
      margin-top:4px;
    }

    .button-container{
      margin-top:35px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:22px;
      padding-bottom:40px;
    }

    .circle-btn{
      width:170px;
      height:170px;
      border-radius:50%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      transition:0.2s;
      box-shadow:0 5px 12px rgba(0,0,0,0.15);
    }

    .circle-btn:hover{
      transform:scale(1.04);
    }

    .train-btn{
      background:#dff5e6;
    }

    .directions-btn{
      background:#ffe6c7;
    }

    .btn-icon{
      font-size:36px;
      margin-bottom:8px;
    }

    .btn-text{
      font-size:20px;
      font-weight:bold;
    }

    .btn-hint{
      font-size:14px;
      color:#555;
      margin-top:-12px;
    }

    .output-box{
      width:92%;
      max-width:420px;
    }

    .train-card{
      background:white;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.12);
    }

    .card-top{
      background:#1565c0;
      color:white;
      padding:16px;
    }

    .train-name{
      font-size:22px;
      font-weight:bold;
      line-height:1.3;
    }

    .station-name{
      font-size:17px;
      margin-top:8px;
    }

    .status-strip{
      margin-top:12px;
      background:#fff3cd;
      color:#856404;
      padding:10px;
      border-radius:10px;
      font-size:15px;
      font-weight:bold;
    }

    .card-body{
      padding:16px;
    }

    .time-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .time-box{
      background:#f7f7f7;
      border-radius:12px;
      padding:12px;
      text-align:center;
    }

    .time-title{
      font-size:14px;
      color:#555;
    }

    .time-value{
      font-size:20px;
      font-weight:bold;
      margin-top:4px;
    }

    .journey-box{
      margin-top:18px;
      background:#eef4ff;
      padding:12px;
      border-radius:12px;
      text-align:center;
      font-size:15px;
      line-height:1.6;
    }

    .journey-line{
      margin-top:8px;
      font-weight:bold;
      color:#1565c0;
    }

    .card-actions{
      display:flex;
      gap:10px;
      margin-top:18px;
    }

    .action-btn{
      flex:1;
      border:none;
      background:#1565c0;
      color:white;
      padding:10px;
      border-radius:10px;
      font-size:14px;
      cursor:pointer;
    }

    .mic-overlay{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:rgba(0,150,136,0.95);
      color:white;
      width:170px;
      height:170px;
      border-radius:50%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:9999;
      animation:pulse 1.5s infinite;
      box-shadow:0 0 25px rgba(0,0,0,0.35);
    }

    .mic-icon{
      font-size:48px;
    }

    .mic-text{
      margin-top:10px;
      font-size:16px;
      font-weight:bold;
    }

    @keyframes pulse{

      0%{
        transform:translate(-50%,-50%) scale(1);
      }

      50%{
        transform:translate(-50%,-50%) scale(1.08);
      }

      100%{
        transform:translate(-50%,-50%) scale(1);
      }
    }

  </style>
</head>

<body>

  <header>

    <div class="logo">

      <div class="logo-icon">🚉</div>

      <div>

        <div class="title">
          <span class="rail">Rail</span><span class="safar">Safar</span>
        </div>

        <div class="tagline">
          आपकी यात्रा का स्मार्ट साथी
        </div>

      </div>

    </div>

    <div class="share-container">

      <button class="share-btn" onclick="shareApp()">
        📤
      </button>

      <div class="share-text">
        Share
      </div>

    </div>

  </header>

  <!-- BUTTONS -->

  <div class="button-container">

    <div class="circle-btn train-btn" onclick="askTrainName()">

      <div class="btn-icon">🚆</div>

      <div class="btn-text">
        ट्रेन कब आएगी
      </div>

    </div>

    <div class="btn-hint">
      👉 बटन दबाइये और ट्रेन + स्टेशन बोलिये
    </div>

    <div class="circle-btn directions-btn" onclick="askDirections()">

      <div class="btn-icon">🧭</div>

      <div class="btn-text">
        किधर जाऊं
      </div>

    </div>

    <div class="btn-hint">
      👉 जगह का नाम बोलिये
    </div>

    <!-- OUTPUT -->

    <div id="output-box" class="output-box"></div>

  </div>

  <!-- MIC -->

  <div
    id="mic-overlay"
    class="mic-overlay"
    style="display:none;"
  >

    <div class="mic-icon">🎤</div>

    <div class="mic-text">
      Listening...
    </div>

  </div>

  <script>

  // SHARE

  function shareApp(){

    if(navigator.share){

      navigator.share({

        title:'RailSafar',

        text:'RailSafar - आपकी यात्रा का स्मार्ट साथी',

        url:window.location.href

      });

    }else{

      alert(
        "Sharing not supported in this browser."
      );
    }
  }

  // TRAIN DATABASE

  const trains = [

    {

      number:"14864",

      hindi:"मरुधर एक्सप्रेस",

      english:"Marudhar Express",

      etrainSlug:"Marudhar-Express-14864",

      aliases:[
        "मरुधर",
        "मरुधर ट्रेन"
      ],

      stations:{

        "जयपुर":{
          aliases:[
            "जयपुर",
            "जयपुर जंक्शन",
            "JP"
          ],
          code:"JP",
          arrival:"01:15 AM",
          departure:"01:25 AM"
        },

        "अजमेर":{
          aliases:[
            "अजमेर",
            "अजमेर जंक्शन"
          ],
          code:"AII",
          arrival:"11:20 PM",
          departure:"11:30 PM"
        }

      }

    },

    {

      number:"12413",

      hindi:"अमृतसर एक्सप्रेस",

      english:"Amritsar Express",

      etrainSlug:"Amritsar-Express-12413",

      aliases:[
        "अमृतसर",
        "अमरसर",
        "अमृतसर वाली ट्रेन"
      ],

      stations:{

        "जयपुर":{
          aliases:[
            "जयपुर",
            "जयपुर जंक्शन",
            "JP"
          ],
          code:"JP",
          arrival:"07:45 PM",
          departure:"07:50 PM"
        }

      }

    }

  ];

  // MIC

  function showMic(){

    document.getElementById("mic-overlay")
    .style.display = "flex";
  }

  function hideMic(){

    document.getElementById("mic-overlay")
    .style.display = "none";
  }

  // VOICE

  function speakText(text){

    const speech =
      new SpeechSynthesisUtterance(text);

    speech.lang = "hi-IN";

    speech.rate = 1;

    speech.pitch = 1;

    window.speechSynthesis.speak(speech);
  }

  // QUERY PARSER

  function parseTrainQuery(text){

    text = text.trim();

    let intent = "arrival";

    if(
      text.includes("आएगी") ||
      text.includes("आगमन") ||
      text.includes("पहुंचेगी") ||
      text.includes("टाइम")
    ){

      intent = "arrival";
    }

    if(
      text.includes("जाएगी") ||
      text.includes("निकलेगी") ||
      text.includes("प्रस्थान")
    ){

      intent = "departure";
    }

    let matchedTrain = null;

    for(const train of trains){

      if(text.includes(train.hindi)){

        matchedTrain = train;

        break;
      }

      for(const alias of train.aliases){

        if(text.includes(alias)){

          matchedTrain = train;

          break;
        }
      }

      if(matchedTrain) break;
    }

    let matchedStation = null;

    if(matchedTrain){

      for(const stationName in matchedTrain.stations){

        const stationData =
          matchedTrain.stations[stationName];

        if(text.includes(stationName)){

          matchedStation = stationName;

          break;
        }

        for(const alias of stationData.aliases){

          if(text.includes(alias)){

            matchedStation = stationName;

            break;
          }
        }

        if(matchedStation) break;
      }
    }

    return{

      train:matchedTrain,

      station:matchedStation,

      intent:intent
    };
  }

  // TIME CALCULATOR

  function addDelayToTime(timeStr, delayMinutes){

    let [time, modifier] =
      timeStr.split(" ");

    let [hours, minutes] =
      time.split(":");

    hours = parseInt(hours);
    minutes = parseInt(minutes);

    if(modifier === "PM" && hours !== 12){

      hours += 12;
    }

    if(modifier === "AM" && hours === 12){

      hours = 0;
    }

    const date = new Date();

    date.setHours(hours);
    date.setMinutes(minutes);

    date.setMinutes(
      date.getMinutes() + delayMinutes
    );

    let newHours = date.getHours();

    let newMinutes =
      date.getMinutes();

    let ampm = "AM";

    if(newHours >= 12){

      ampm = "PM";
    }

    newHours = newHours % 12;

    if(newHours === 0){

      newHours = 12;
    }

    newMinutes =
      newMinutes.toString().padStart(2,'0');

    return `${newHours}:${newMinutes} ${ampm}`;
  }

  // TRAIN BUTTON

  function askTrainName(){

    if('webkitSpeechRecognition' in window){

      showMic();

      const recognition =
        new webkitSpeechRecognition();

      recognition.lang = 'hi-IN';

      recognition.start();

      recognition.onresult = function(event){

        hideMic();

        const spokenText =
          event.results[0][0].transcript.trim();

        const box =
          document.getElementById("output-box");

        // VERIFY CARD

        box.innerHTML = `

          <div class="train-card">

            <div class="card-body">

              <div style="
                font-size:18px;
                font-weight:bold;
                margin-bottom:15px;
                text-align:center;
              ">

                🎤 क्या आपने यही कहा?

              </div>

              <div style="
                background:#eef4ff;
                padding:14px;
                border-radius:12px;
                text-align:center;
                font-size:18px;
                line-height:1.6;
              ">

                ${spokenText}

              </div>

              <div class="card-actions"
                style="margin-top:20px;"
              >

                <button
                  class="action-btn"
                  onclick='confirmTrainQuery(${JSON.stringify(spokenText)})'
                >

                  ✅ हाँ

                </button>

                <button
                  class="action-btn"
                  onclick="askTrainName()"
                >

                  ❌ नहीं

                </button>

              </div>

            </div>

          </div>

        `;
      };

      recognition.onerror = function(){

        hideMic();

        alert(
          "आवाज़ समझने में समस्या हुई"
        );
      };

      recognition.onend = hideMic;

    }else{

      alert(
        "आपके ब्राउज़र में Voice Support उपलब्ध नहीं है"
      );
    }
  }
    async function fetchRailData(query){

  try{

    const response =
      await fetch(

        "https://railsafar-backend.onrender.com/rail-query",

        {

          method:"POST",

          headers:{
            "Content-Type":"application/json"
          },

          body:JSON.stringify({

            query:query
          })
        }
      );

    const data =
      await response.json();

    console.log(data);

    return data;

  }catch(error){

    console.log(error);

    return null;
  }
}

  // CONFIRM TRAIN QUERY

  async function confirmTrainQuery(spokenText){

    const result =
      parseTrainQuery(spokenText);

    const box =
      document.getElementById("output-box");

    // TRAIN NOT FOUND

    if(!result.train){

      box.innerHTML = `

        <div class="train-card">

          <div class="card-body">

            ❌ ट्रेन पहचान में नहीं आई

          </div>

        </div>

      `;

      return;
    }

    // STATION NOT FOUND

    if(!result.station){

      box.innerHTML = `

        <div class="train-card">

          <div class="card-body">

            ❌ स्टेशन पहचान में नहीं आया

          </div>

        </div>

      `;

      return;
    }

    // LOADING

    box.innerHTML = `

      <div class="train-card">

        <div class="card-body"
          style="
            text-align:center;
            padding:30px;
          "
        >

          <div style="
            font-size:40px;
          ">
            📡
          </div>

          <div style="
            margin-top:15px;
            font-size:18px;
            font-weight:bold;
          ">

            लाइव जानकारी खोजी जा रही है...

          </div>

        </div>

      </div>

    `;

    const stationData =
      result.train.stations[result.station];

    let delayMinutes = 0;

    let liveStatus =
      "📡 लाइव जानकारी प्राप्त हुई";

    // REAL FETCH

    try{

      const liveUrl =

        `https://r.jina.ai/http://etrain.info/train/${result.train.etrainSlug}/live`;

      console.log(liveUrl);

      const response =
        await fetch(liveUrl);

      const text =
        await response.text();

      console.log(text);

      const lowerText =
        text.toLowerCase();

      // SMART STATION PARSER

const stationCode =

  result.train
  .stations[result.station]
  .code
  .toLowerCase();
      
const stationIndex =
  lowerText.indexOf(stationCode);
      
if(stationIndex !== -1){

  const nearbyText =

    lowerText.substring(
      stationIndex,
      stationIndex + 500
    );

  console.log(
    "Station Block:",
    nearbyText
  );

  // CANCELLED

  if(
    nearbyText.includes("cancelled")
  ){

    delayMinutes = 0;

    liveStatus =
      "❌ ट्रेन रद्द दिखाई दे रही है";
  }

  // RESCHEDULED

  else if(
    nearbyText.includes("rescheduled")
  ){

    delayMinutes = 120;

    liveStatus =
      "🚨 ट्रेन पुनर्निर्धारित दिखाई दे रही है";
  }

  // LATE BY

  else if(
    nearbyText.includes("late by")
  ){

    const lateMatch =

      nearbyText.match(
        /late by\s+(\d+)/i
      );

    if(lateMatch){

      delayMinutes =
        parseInt(lateMatch[1]);

    }else{

      delayMinutes = 15;
    }

    liveStatus =
      `⏱️ ट्रेन लगभग ${delayMinutes} मिनट देरी से चल रही है`;
  }

  // DELAYED

  else if(
    nearbyText.includes("delayed")
  ){

    delayMinutes = 20;

    liveStatus =
      "⚠️ ट्रेन देरी से चल रही है";
  }

  // ON TIME

  else if(
    nearbyText.includes("on time")
  ){

    delayMinutes = 0;

    liveStatus =
      "✅ ट्रेन समय पर चल रही है";
  }

  // NO DATA

  else{

    delayMinutes = 0;

    liveStatus =
      "📡 स्टेशन की लाइव स्थिति स्पष्ट नहीं मिली";
  }

}else{

  delayMinutes = 0;

  liveStatus =
    "📡 स्टेशन ब्लॉक नहीं मिला";
}
    }catch(error){

  console.log(error);

  liveStatus =
    "📡 लाइव जानकारी अभी उपलब्ध नहीं है";

  delayMinutes = 0;
}

    // EXPECTED TIMES

    const expectedArrival =
      addDelayToTime(
        stationData.arrival,
        delayMinutes
      );

    const expectedDeparture =
      addDelayToTime(
        stationData.departure,
        delayMinutes
      );

    // VOICE

    const voiceReply =

      `${result.train.hindi}
       ${liveStatus}`;

    // FINAL CARD

    box.innerHTML = `

      <div class="train-card">

        <div class="card-top">

          <div class="train-name">

            🚆 ${result.train.hindi}

            (${result.train.number})

          </div>

          <div class="station-name">

            📍 ${result.station} जंक्शन

          </div>

          <div class="status-strip">

            ${liveStatus}

          </div>

        </div>

        <div class="card-body">

          <div class="time-grid">

            <div class="time-box">

              <div class="time-title">

                🟢 निर्धारित आगमन

              </div>

              <div class="time-value">

                ${stationData.arrival}

              </div>

              <div style="
                margin-top:8px;
                font-size:14px;
                color:#d97706;
                font-weight:bold;
              ">

                अनुमानित:
                ${expectedArrival}

              </div>

            </div>

            <div class="time-box">

              <div class="time-title">

                🔴 निर्धारित प्रस्थान

              </div>

              <div class="time-value">

                ${stationData.departure}

              </div>

              <div style="
                margin-top:8px;
                font-size:14px;
                color:#d97706;
                font-weight:bold;
              ">

                अनुमानित:
                ${expectedDeparture}

              </div>

            </div>

          </div>

          <div class="journey-box">

            🎤 आपने पूछा:

            <strong>

              ${spokenText}

            </strong>

            <div class="journey-line">

              अजमेर ●━━━━━━━ जयपुर

            </div>
            <div style="margin-top:18px;">

  <a
    href="https://etrain.info/train/${result.train.etrainSlug}/live"
    target="_blank"
    style="
      display:block;
      width:100%;
      text-decoration:none;
    "
  >

    <button
      style="
        width:100%;
        border:none;
        background:#d32f2f;
        color:white;
        padding:14px;
        border-radius:12px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
      "
    >

      🔴 रेलवे लाइव स्टेटस देखें

    </button>

  </a>

</div>

          </div>

        </div>

      </div>

    `;

    speakText(voiceReply);
  }

  // DIRECTIONS BUTTON

  function askDirections(){

    if('webkitSpeechRecognition' in window){

      showMic();

      const recognition =
        new webkitSpeechRecognition();

      recognition.lang = 'hi-IN';

      recognition.start();

      recognition.onresult = function(event){

        hideMic();

        const spokenText =
          event.results[0][0].transcript.trim();

        const box =
          document.getElementById("output-box");

        // VERIFY CARD

        box.innerHTML = `

          <div class="train-card">

            <div class="card-body">

              <div style="
                font-size:18px;
                font-weight:bold;
                margin-bottom:15px;
                text-align:center;
              ">

                🧭 क्या आपको यही जगह जाना है?

              </div>

              <div style="
                background:#fff7ed;
                padding:14px;
                border-radius:12px;
                text-align:center;
                font-size:18px;
                line-height:1.6;
              ">

                ${spokenText}

              </div>

              <div class="card-actions"
                style="margin-top:20px;"
              >

                <button
                  class="action-btn"
                  onclick='confirmDirection(${JSON.stringify(spokenText)})'
                >

                  ✅ हाँ

                </button>

                <button
                  class="action-btn"
                  onclick="askDirections()"
                >

                  ❌ नहीं

                </button>

              </div>

            </div>

          </div>

        `;
      };

      recognition.onerror = function(){

        hideMic();

        alert(
          "आवाज़ समझने में समस्या हुई"
        );
      };

      recognition.onend = hideMic;
    }
  }

  // CONFIRM DIRECTION

  function confirmDirection(place){

    const mapsUrl =

      `https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${encodeURIComponent(place)}&travelmode=walking`;

    window.open(mapsUrl,"_blank");
  }

</script>
</body>
</html>
