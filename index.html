<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RailSafar</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Mukta', sans-serif;
      background-color: #f9f9f9; /* हल्का ग्रे बैकग्राउंड */
    }
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 10px 15px;
      background-color: #ffffff; /* सफेद हेडर */
      border-bottom: 1px solid #ddd;
    }
    .logo {
      display: flex;
      align-items: center;
    }
    .logo-icon {
      font-size: 32px;
      margin-right: 8px;
      color: #444;
    }
    .title {
      font-size: 26px;
      font-weight: bold;
    }
    .title .rail {
      color: #d32f2f; /* लाल */
    }
    .title .safar {
      color: #222; /* काला */
    }
    .tagline {
      font-size: 16px;
      color: #666;
      margin-top: 0px;
    }
    .button-container {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }
    .circle-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%; /* पूरी तरह गोल */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.3s ease;
    }
    .circle-btn:hover {
      transform: scale(1.05);
    }
    .train-btn {
      background-color: #e0f2e9; /* हल्का हरा */
      color: #222;
    }
    .train-btn:hover {
      background-color: #c8e6c9;
    }
    
    .directions-btn {
      background-color: #ffe0b2; /* हल्का ऑरेंज */
      color: #222;
    }
    .directions-btn:hover {
      background-color: #ffcc80;
    }
    .btn-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .btn-text {
      font-size: 18px;
    }
    .btn-hint {
      font-size: 14px;
      color: #555;
      margin-top: 8px;
    }

  </style>
</head>
<body>

  <header>
    <!-- Logo + Title -->
    <div class="logo">
      <span class="logo-icon">🚉</span>
      <div>
        <div class="title"><span class="rail">Rail</span><span class="safar">Safar</span></div>
        <div class="tagline">आपकी यात्रा का स्मार्ट साथी</div>
      </div>
    </div>

    <!-- Share Button + Text -->
    <div class="share-container">
      <button class="share-btn" onclick="shareApp()">📤</button>
      <div class="share-text">Shear</div>
    </div>
  </header>
  <!-- Main Circular Button: ट्रेन कब आएगी -->
  <div class="circle-btn train-btn" onclick="askTrainName()">
    <span class="btn-icon">🚆</span>
    <span class="btn-text">ट्रेन कब आएगी</span>
  </div>
  <div class="btn-hint">👉 बटन दबाइये और ट्रेन का नाम बोलिये</div>

    <!-- किधर जाऊं -->
    <div class="circle-btn directions-btn">
      <span class="btn-icon">🧭</span>
      <span class="btn-text">किधर जाऊं</span>
    </div>
    <div class="btn-hint">बटन दबाइये और बोलिये</div>
  </div>

  <script>
    function shareApp() {
      if (navigator.share) {
        navigator.share({
          title: 'RailSafar',
          text: 'RailSafar – आपकी यात्रा का स्मार्ट साथी',
          url: window.location.href
        }).catch(console.error);
      } else {
        alert("Sharing not supported. Copy this link: " + window.location.href);
      }
    }

    function askTrainName() {
      if ('webkitSpeechRecognition' in window) {
        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'hi-IN'; // हिंदी इनपुट
        recognition.start();

        recognition.onresult = function(event) {
          const spokenText = event.results[0][0].transcript;
          alert("आपने कहा: " + spokenText + "\n(सिस्टम ट्रेन का नाम पहचानकर बॉक्स में जानकारी दिखाएगा)");
          // 👉 यहां बाद में API कॉल जोड़ेंगे
        };
      } else {
        alert("आपके ब्राउज़र में वॉइस इनपुट सपोर्ट नहीं है।");
      }
    }
  </script>

</body>
</html>
